
<!-- header secundario -->
<header class="filter-container">
    <div class="align-container">

        <!-- filtros de select -->
        <form [formGroup]="filtrosForm" class="filter-box">

            <div class="filtro-grupo status-grupo">
                <label for="statusSelect">Filtrar status:</label>
                <select id="statusSelect" formControlName="status">
                    <option [ngValue]="null">Todos</option>
                    <option value="ABERTA">Aberta</option>
                    <option value="CANCELADA">Cancelada</option>
                    <option value="RESOLVIDA">Resolvida</option>
                    <option value="EM_ANDAMENTO">Em Andamento</option>
                </select>
            </div>

            <div class="filtro-grupo prioridade-grupo">
                <label for="prioridadeSelect">Filtrar prioridade:</label>
                <select id="prioridadeSelect" formControlName="prioridade">
                    <option [ngValue]="null">Todas</option>
                    <option value="ALTA">Alta</option>
                    <option value="MEDIA">Média</option>
                    <option value="BAIXA">Baixa</option>
                </select>
            </div>

            <div class="filtro-grupo ordenacao-grupo">
                <label for="dateSelect">Ordenar:</label>
                <select id="dateSelect" formControlName="sort">
                    <option [ngValue]="null">Limpar filtro</option>

                    <optgroup label="Data de Abertura">
                        <option value="dataAbertura,asc">Mais antigas</option>
                        <option value="dataAbertura,desc">Mais recentes</option>
                    </optgroup>

                    <optgroup label="Data de Atualização">
                        <option value="dataAtualizacao,asc">Mais antigas</option>
                        <option value="dataAtualizacao,desc">Mais recentes</option>
                    </optgroup>
                </select>
            </div>
        </form>

        <app-searchbar-component (termoBuscado)="searchReceiver($event)">
        </app-searchbar-component>

    </div>
</header>

<!-- container pai do formulario e lista -->
<div class="workspace-page">

    <!-- formulario -->
    <form [formGroup]="incident">
        <div class="form-header">
            <label>#
                <input type="text" formControlName="id" placeholder="0000">
            </label>

            <label>Abertura
                <input type="datetime-local" formControlName="dataAbertura">
            </label>

            <label>Última Atualização
                <input 
                type="datetime-local" 
                formControlName="dataAtualizacao">
            </label>
        </div>

        <div class="form-input-group">
            <label>Título
                <input 
                type="text" 
                formControlName="titulo" 
                placeholder="Digite o título"
                [ngClass]="{'input-error': incident.get('titulo')?.invalid && incident.get('titulo')?.touched}">
            </label>

            <label>Responsável:
                <input 
                type="email" 
                formControlName="responsavel" 
                placeholder="nome@email.com"
                [ngClass]="{'input-error': incident.get('responsavel')?.invalid && incident.get('responsavel')?.touched}">
            </label>
        </div>

        <div class="form-select-group">
            <label>Prioridade:
                <select formControlName="prioridade"
                    [ngClass]="{'input-error': incident.get('prioridade')?.invalid && incident.get('prioridade')?.touched}">

                    <option value="" selected disabled>Selecione um valor</option>
                    <option value="BAIXA">Baixa</option>
                    <option value="MEDIA">Média</option>
                    <option value="ALTA">Alta</option>
                </select>
            </label>

            <label>Status:
                <select formControlName="status"
                    [ngClass]="{'input-error': incident.get('status')?.invalid && incident.get('status')?.touched}">

                    <option value="" selected disabled>Selecione um valor</option>
                    <option value="ABERTA">Aberta</option>
                    <option value="EM_ANDAMENTO">Em Andamento</option>
                    <option value="RESOLVIDA">Resolvida</option>
                    <option value="CANCELADA">Cancelada</option>
                </select>
            </label>
        </div>

        <label>Descrição:
            <textarea 
            formControlName="descricao" 
            placeholder="Digite a descrição aqui..."
            [ngClass]="{'input-error': incident.get('descricao')?.invalid && incident.get('descricao')?.touched}"></textarea>
        </label>

        <label>Tags:
            <textarea 
            formControlName="tags" 
            placeholder="Digite as tags separando por virgula para editar"
            [ngClass]="{'input-error': incident.get('tags')?.invalid && incident.get('tags')?.touched}"></textarea>
        </label>

        <div class="form-button-container">

            @if(btnController) {
            
            <button type="button" 
            class="button" 
            [disabled]="incident.invalid"
            (click)="incidentsCreate()">Salvar</button>
            
            } @else {

            <button 
            type="button" 
            class="button" 
            (click)="resetForm()">Limpar</button>

            <button 
            type="button" 
            class="button" 
            (click)="incidentsUpdate()"
            [disabled]="incident.invalid">Alterar</button>

            <button 
            type="button" 
            class="button delete" 
            (click)="incidentDelete()">Excluir</button>
            }

        </div>
    </form>

    <!-- container dos incidents -->
    <section class="incidents-container">

        <div class="incidents-container-head">
            <h3>Tickets Recentes</h3>

            <app-pageable-component 
            [paginaAtual]="paginaAtual" 
            [totalPaginas]="totalPaginas" 
            [totalItens]="totalItens"
            (mudarPagina)="getNewPage($event)">
            </app-pageable-component>

        </div>
        
        <div class="incidents-list">
            @for(item of incidentsList(); track item.id) {

                <app-card-incident-component 
                    [incident]="item" 
                    (cardClick)="selectIncident($event)"
                    (cardDoubleClick)="goToCommentsPageById($event)">
                </app-card-incident-component>

            } @empty {

                <app-card-incident-component [dataAtual]="dataAtual">
                </app-card-incident-component>

            }
        </div> 

    </section>
</div>
