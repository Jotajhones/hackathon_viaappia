spring:
  application:
    name: api
  data:
    web:
      pageable:
        page-serialization-mode: via-dto
  datasource:
    url: jdbc:postgresql://localhost:5432/incidents
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  cache:
    type: simple